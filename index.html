<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h2>Create Password</h2>

    <div class="input-box">
      <i class="fa-solid fa-lock icon"></i>
      <input type="password" placeholder="Enter password" id="password">
      <i class="fa-solid fa-eye toggle"></i>
    </div>

    <div class="meter">
      <div class="bar" id="strengthBar"></div>
    </div>

    <p class="strength-text">Strength: very weak</p>

    <ul class="requirements">
      <li id="length"><i class="fa-solid fa-circle"></i> 6+ characters</li>
      <li id="uppercase"><i class="fa-solid fa-circle"></i> Uppercase letter</li>
      <li id="number"><i class="fa-solid fa-circle"></i> Number</li>
      <li id="special"><i class="fa-solid fa-circle"></i> Special character</li>
    </ul>
  </div>
  <script src="Script.js" ></script>
</body>
</html>
